<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>அறுவடை அரண் | உள்நுழைவு</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mukta+Malar:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-wrapper">
  <header class="navbar glass-card">
    <div class="brand">
      🌾 <span>அறுவடை அரண்</span>
    </div>
    <nav>
      <a href="home.html">முகப்பு • Home</a>
      <a class="active" href="login.html">உள்நுழைவு • Login</a>
      <a href="dashboard.html">டாஷ்போர்ட் • Dashboard</a>
      <a href="contact.html">தொடர்பு • Contact</a>
    </nav>
  </header>

  <main class="content" style="max-width: 520px;">
    <section class="glass-card form-card">
      <header>
        <h1>உள்நுழைவு • Login</h1>
        <p>அறுவடை அரண் டாஷ்போர்டில் தொடர உங்கள் கணக்கில் உள்நுழைக.</p>
      </header>
      <form id="loginForm">
        <div>
          <label for="loginEmail">மின்னஞ்சல் • Email</label>
          <input type="email" id="loginEmail" name="email" placeholder="you@example.com" required />
        </div>
        <div>
          <label for="loginPassword">கடவுச்சொல் • Password</label>
          <input type="password" id="loginPassword" name="password" placeholder="கடவுச்சொல்லை உள்ளிடவும்" required />
        </div>
        <p id="loginStatus" class="form-status" role="status"></p>
        <button type="submit" class="btn">உள்நுழைக</button>
      </form>
      <p>
        கணக்கு இல்லையா? <a href="#" class="primary-link">புதிய பதிவு • Register</a>
      </p>
    </section>
  </main>

  <footer class="footer">
    © 2025 அறுவடை அரண் • Harvest secured, farmers empowered
  </footer>
  <script src="script.js"></script>
</body>
</html>
